name: Bug Report
description: Report a bug in pywrkr
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: pywrkr version
      description: "Run `pywrkr --version` or `python -c 'import pywrkr; print(pywrkr.__version__)'`"
      placeholder: "1.0.2"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Run `python --version`"
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: The exact command or steps to reproduce the issue.
      placeholder: |
        1. Run `pywrkr --rate 500 -d 30 http://localhost:8080/`
        2. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include error messages or output.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other relevant information (logs, screenshots, config).
    validations:
      required: false
